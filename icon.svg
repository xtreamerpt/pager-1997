  <!-- Pager Plastic Casing -->
  <rect x="66" y="86" width="380" height="340" rx="40" fill="#1e1e1e" stroke="#333333" stroke-width="16"/>
  <rect x="86" y="106" width="340" height="300" rx="28" fill="none" stroke="#2a2a2a" stroke-width="4"/>
  
  <!-- Green LCD Screen -->
